        run: |
          echo "::add-mask::$NETLIFY_PROXY_PATH"
          npx -y @netlify/mcp@latest --site-id 28297ccc-3806-43bb-bd43-4e8dfce83920 --proxy-path "$NETLIFY_PROXY_PATH"
